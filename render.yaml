# Use a Background Worker so the Discord bot stays running 24/7 without spin-down.
# (Web Service on free tier sleeps after ~15 min without HTTP traffic; Background Worker does not.)
services:
  - type: worker
    name: gv-legacy-general-mod
    runtime: node
    buildCommand: yarn
    startCommand: yarn start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
